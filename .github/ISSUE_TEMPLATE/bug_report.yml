name: 🐛 Reportar un bug
description: Algo no funciona como debería
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar. Llenar este formulario completo permite que el equipo
        (humanos y agente automatizado) trabajen el issue sin pedir aclaraciones.
        Los campos con * son obligatorios.

  - type: textarea
    id: sintoma
    attributes:
      label: Qué pasa (síntoma observable)
      description: Una frase clara de lo que ves mal en pantalla.
      placeholder: "Ej: Al guardar una novedad sin seleccionar motivo aparece error 500."
    validations:
      required: true

  - type: input
    id: modulo
    attributes:
      label: Módulo / pantalla
      description: En qué parte del aplicativo ocurre.
      placeholder: "Ej: Producción → Molido → modal 'Registrar Novedad'"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL exacta (si la conoces)
      placeholder: "Ej: https://colorplastic-app-...run.app/gestion/produccion/molido/"

  - type: dropdown
    id: reportador
    attributes:
      label: Quién lo reportó
      options:
        - Yo mismo
        - Operario o empleado interno
        - Cliente final / usuario externo
        - Reunión con cliente (incluir link abajo)
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      description: Lista paso a paso. Sin esto, el bug es muy difícil de arreglar.
      placeholder: |
        1. Login con mi usuario.
        2. Entrar a Producción → Molido.
        3. Click en "Registrar Novedad" arriba a la derecha.
        4. Dejar el campo motivo en blanco.
        5. Click en "Guardar".
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Qué esperabas que pasara
      placeholder: "Ej: Que aparezca un mensaje 'Debe seleccionar un motivo' y el formulario se quede abierto."
    validations:
      required: true

  - type: textarea
    id: real
    attributes:
      label: Qué pasa en realidad
      placeholder: "Ej: Error 500 (pantalla en blanco), pierdo todo lo que había escrito."
    validations:
      required: true

  - type: textarea
    id: adjuntos
    attributes:
      label: Screenshots / archivos / links
      description: |
        Arrastrá imágenes aquí. Si el bug se discutió en reunión, pegar link a
        la grabación (Loom, Drive, Teams) — el agente lee transcripciones también.
      placeholder: "Pegar links o arrastrar archivos."

  - type: dropdown
    id: prioridad
    attributes:
      label: Prioridad
      description: Cómo afecta la operación diaria.
      options:
        - Urgente — bloquea operación diaria
        - Importante — afecta calidad pero hay workaround
        - Futuro — mejora deseable, no urgente
    validations:
      required: true
