name: ✨ Solicitar mejora o feature nuevo
description: Algo nuevo que querés agregar o mejorar
title: "[Mejora] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Para que el equipo pueda evaluar y priorizar, necesitamos entender el
        problema de negocio antes que la solución técnica. Los campos con * son obligatorios.

  - type: textarea
    id: problema
    attributes:
      label: Qué problema de negocio resuelve
      description: |
        Describí la fricción actual del usuario, no la solución técnica.
      placeholder: |
        "Hoy los operarios pierden 15 minutos por turno copiando datos del
        formato físico al sistema porque..."
    validations:
      required: true

  - type: textarea
    id: solucion
    attributes:
      label: Cómo te imaginás la solución
      description: Si tenés idea de cómo se vería en pantalla, contala.
      placeholder: |
        "Agregar un botón 'Importar desde Excel' en la pantalla X que..."

  - type: input
    id: modulo
    attributes:
      label: Módulo / pantalla donde aplica
      placeholder: "Ej: Inventario → Lista de lotes"
    validations:
      required: true

  - type: dropdown
    id: usuario_objetivo
    attributes:
      label: Quién es el usuario objetivo
      options:
        - Operario / personal de planta
        - Líder de proceso / supervisor
        - Gerencia
        - Cliente final / externo
        - Equipo administrativo
    validations:
      required: true

  - type: textarea
    id: adjuntos
    attributes:
      label: Mockups / referencias / formatos físicos
      description: |
        Si tenés formatos físicos en papel, fotos, ejemplos de otros sistemas
        o links a grabaciones donde se discutió, adjuntalo.
      placeholder: "Pegar links o arrastrar archivos."

  - type: dropdown
    id: prioridad
    attributes:
      label: Prioridad
      options:
        - Urgente — bloquea proyecto en curso
        - Importante — alta utilidad pero no bloquea
        - Futuro — sería bueno tenerlo
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: Fecha sugerida (si aplica)
      description: Si hay un compromiso con cliente o evento.
      placeholder: "YYYY-MM-DD"
